<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#07051a"/>
      <stop offset="100%" style="stop-color:#0d0a2e"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 Z" fill="#ec4899" fill-opacity="0.8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 Z" fill="#16a34a" fill-opacity="0.8"/>
    </marker>
  </defs>

  <rect width="900" height="220" rx="10" fill="url(#bg)" stroke="#2d1b6e" stroke-width="1"/>

  <!-- Title -->
  <text x="20" y="24" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b7cb0" letter-spacing="0.08em">RAG CHAT RETRIEVAL FLOW</text>

  <!-- Step boxes -->
  <!-- 1: User message -->
  <rect x="20" y="44" width="100" height="56" rx="6" fill="#1a0d3d" stroke="#7c3aed" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="70" y="66" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed" fill-opacity="0.7">1</text>
  <text x="70" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#c4b5fd">User</text>
  <text x="70" y="93" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b7cb0">types question</text>

  <!-- Arrow -->
  <line x1="120" y1="72" x2="148" y2="72" stroke="#ec4899" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2: Next.js -->
  <rect x="148" y="44" width="108" height="56" rx="6" fill="#1a0d3d" stroke="#ec4899" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="202" y="66" text-anchor="middle" font-family="monospace" font-size="9" fill="#ec4899" fill-opacity="0.7">2</text>
  <text x="202" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f9a8d4">Next.js</text>
  <text x="202" y="93" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b7cb0">POST /api/chat</text>

  <!-- Arrow -->
  <line x1="256" y1="72" x2="284" y2="72" stroke="#ec4899" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3: FastAPI -->
  <rect x="284" y="44" width="108" height="56" rx="6" fill="#1a0d3d" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="338" y="66" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed" fill-opacity="0.7">3</text>
  <text x="338" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#c4b5fd">FastAPI</text>
  <text x="338" y="93" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b7cb0">embed + search</text>

  <!-- Arrow -->
  <line x1="392" y1="72" x2="420" y2="72" stroke="#ec4899" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4: AI Search -->
  <rect x="420" y="44" width="108" height="56" rx="6" fill="#1a0d3d" stroke="#a78bfa" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="474" y="66" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed" fill-opacity="0.7">4</text>
  <text x="474" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#c4b5fd">AI Search</text>
  <text x="474" y="93" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b7cb0">top-5 chunks</text>

  <!-- Arrow -->
  <line x1="528" y1="72" x2="556" y2="72" stroke="#ec4899" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5: Build prompt -->
  <rect x="556" y="44" width="108" height="56" rx="6" fill="#1a0d3d" stroke="#ec4899" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="610" y="66" text-anchor="middle" font-family="monospace" font-size="9" fill="#ec4899" fill-opacity="0.7">5</text>
  <text x="610" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f9a8d4">Build Prompt</text>
  <text x="610" y="93" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b7cb0">context + question</text>

  <!-- Arrow -->
  <line x1="664" y1="72" x2="692" y2="72" stroke="#ec4899" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 6: GPT-4o -->
  <rect x="692" y="44" width="108" height="56" rx="6" fill="#1a0d3d" stroke="#ec4899" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="746" y="66" text-anchor="middle" font-family="monospace" font-size="9" fill="#ec4899" fill-opacity="0.7">6</text>
  <text x="746" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f9a8d4">GPT-4o</text>
  <text x="746" y="93" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b7cb0">stream completion</text>

  <!-- Arrow (green — response back) -->
  <line x1="800" y1="72" x2="828" y2="72" stroke="#16a34a" stroke-opacity="0.7" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- 7: Browser -->
  <rect x="828" y="44" width="56" height="56" rx="6" fill="#1a0d3d" stroke="#16a34a" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="856" y="67" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#86efac">⚡</text>
  <text x="856" y="83" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac">stream</text>
  <text x="856" y="94" text-anchor="middle" font-family="monospace" font-size="9" fill="#16a34a" fill-opacity="0.6">to UI</text>

  <!-- Metadata row -->
  <text x="70" y="130" text-anchor="middle" font-family="monospace" font-size="9" fill="#4b3f7a">React UI</text>
  <text x="202" y="130" text-anchor="middle" font-family="monospace" font-size="9" fill="#4b3f7a">Server Action</text>
  <text x="338" y="130" text-anchor="middle" font-family="monospace" font-size="9" fill="#4b3f7a">embed question</text>
  <text x="474" y="130" text-anchor="middle" font-family="monospace" font-size="9" fill="#4b3f7a">semantic + keyword</text>
  <text x="610" y="130" text-anchor="middle" font-family="monospace" font-size="9" fill="#4b3f7a">system + context</text>
  <text x="746" y="130" text-anchor="middle" font-family="monospace" font-size="9" fill="#4b3f7a">temperature: 0</text>
  <text x="856" y="130" text-anchor="middle" font-family="monospace" font-size="9" fill="#16a34a" fill-opacity="0.7">SSE chunks</text>

  <!-- Key note -->
  <rect x="20" y="155" width="860" height="48" rx="6" fill="#0d0a2e" stroke="#2d1b6e" stroke-width="1"/>
  <text x="36" y="174" font-family="monospace" font-size="10" fill="#6d5fa8">RAG grounding prevents hallucination: GPT-4o is instructed to answer ONLY from the provided context chunks.</text>
  <text x="36" y="191" font-family="monospace" font-size="10" fill="#c4b5fd">System prompt: "Answer only using the context below. If the answer is not in the context, say 'I don't know.'"</text>
</svg>
