<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8860a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#2899f5;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="45"/></filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="950" cy="250" rx="400" ry="320" fill="url(#glow)" filter="url(#blur)"/>
  <ellipse cx="200" cy="500" rx="250" ry="200" fill="#c8860a" fill-opacity="0.04" filter="url(#blur)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent1)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#c8860a" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="530" x2="1200" y2="530" stroke="#c8860a" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#0078d4" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="850" y1="0" x2="850" y2="630" stroke="#0078d4" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Project type badge -->
  <rect x="80" y="140" width="140" height="28" rx="14" fill="#0078d4" fill-opacity="0.15" stroke="#0078d4" stroke-opacity="0.4" stroke-width="1"/>
  <text x="150" y="159" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#60a5fa" letter-spacing="0.08em">ARCHITECTURE</text>

  <!-- Status badge -->
  <rect x="240" y="140" width="74" height="28" rx="14" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
  <circle cx="257" cy="154" r="4" fill="#22c55e"/>
  <text x="295" y="159" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#86efac" letter-spacing="0.06em">active</text>

  <!-- Title -->
  <text x="80" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Enterprise</text>
  <text x="80" y="316" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Customer Portal</text>

  <!-- Subtitle -->
  <text x="80" y="372" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#c8860a" letter-spacing="0.01em" font-weight="600">on Azure</text>

  <!-- Description -->
  <text x="80" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#8a7a5a" letter-spacing="0.01em">3-tier architecture · Terraform IaC · Azure DevOps CI/CD</text>

  <!-- Divider -->
  <line x1="80" y1="452" x2="520" y2="452" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Tech chips -->
  <rect x="80" y="466" width="80" height="22" rx="11" fill="#0078d4" fill-opacity="0.12" stroke="#0078d4" stroke-opacity="0.3" stroke-width="1"/>
  <text x="120" y="481" text-anchor="middle" font-family="monospace" font-size="11" fill="#60a5fa">Terraform</text>

  <rect x="170" y="466" width="62" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="201" y="481" text-anchor="middle" font-family="monospace" font-size="11" fill="#f0a500">.NET 8</text>

  <rect x="242" y="466" width="58" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="271" y="481" text-anchor="middle" font-family="monospace" font-size="11" fill="#f0a500">React</text>

  <rect x="310" y="466" width="80" height="22" rx="11" fill="#0078d4" fill-opacity="0.12" stroke="#0078d4" stroke-opacity="0.3" stroke-width="1"/>
  <text x="350" y="481" text-anchor="middle" font-family="monospace" font-size="11" fill="#60a5fa">Playwright</text>

  <rect x="400" y="466" width="80" height="22" rx="11" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
  <text x="440" y="481" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">Azure SQL</text>

  <!-- Site attribution -->
  <text x="80" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#5a4a2a" letter-spacing="0.06em">AZUREFIXES.COM</text>

  <!-- Right side: mini architecture diagram -->
  <!-- VNet boundary -->
  <rect x="880" y="180" width="280" height="310" rx="12" fill="none" stroke="#c8860a" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="1020" y="202" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8860a" fill-opacity="0.5" letter-spacing="0.06em">VNet 10.0.0.0/16</text>

  <!-- Front Door -->
  <rect x="905" y="90" width="120" height="36" rx="6" fill="#0078d4" fill-opacity="0.12" stroke="#0078d4" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="965" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#60a5fa" font-weight="600">Front Door</text>

  <!-- Arrow: FD to App GW -->
  <line x1="965" y1="126" x2="965" y2="148" stroke="#0078d4" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- App Gateway WAF -->
  <rect x="895" y="148" width="140" height="36" rx="6" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="965" y="167" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f0a500" font-weight="600">App Gateway WAF</text>
  <text x="965" y="179" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#c8860a" fill-opacity="0.6">WAF_v2 · SSL Offload</text>

  <!-- Arrow: APPGW to tier boxes -->
  <line x1="965" y1="184" x2="965" y2="220" stroke="#c8860a" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Frontend App Service -->
  <rect x="890" y="220" width="110" height="38" rx="6" fill="none" stroke="#c8860a" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="945" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d4a843">Frontend</text>
  <text x="945" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#c8860a" fill-opacity="0.6">React · App Svc</text>

  <!-- Backend API -->
  <rect x="1010" y="220" width="110" height="38" rx="6" fill="none" stroke="#0078d4" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="1065" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#60a5fa">Backend API</text>
  <text x="1065" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#0078d4" fill-opacity="0.6">.NET 8 · MI</text>

  <!-- Arrow: backend to SQL -->
  <line x1="1065" y1="258" x2="1065" y2="290" stroke="#0078d4" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="945" y1="258" x2="945" y2="274" stroke="#c8860a" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="945" y1="274" x2="1005" y2="290" stroke="#c8860a" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Azure SQL -->
  <rect x="960" y="290" width="120" height="38" rx="6" fill="#a78bfa" fill-opacity="0.08" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="1020" y="307" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c4b5fd">Azure SQL</text>
  <text x="1020" y="320" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa" fill-opacity="0.6">Private Endpoint</text>

  <!-- Shared services row -->
  <rect x="888" y="360" width="70" height="32" rx="5" fill="none" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="923" y="380" text-anchor="middle" font-family="monospace" font-size="9" fill="#c8860a" fill-opacity="0.6">Key Vault</text>

  <rect x="966" y="360" width="58" height="32" rx="5" fill="none" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="995" y="380" text-anchor="middle" font-family="monospace" font-size="9" fill="#c8860a" fill-opacity="0.6">Redis</text>

  <rect x="1032" y="360" width="68" height="32" rx="5" fill="none" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="1066" y="380" text-anchor="middle" font-family="monospace" font-size="9" fill="#c8860a" fill-opacity="0.6">Svc Bus</text>

  <!-- Monitoring -->
  <rect x="888" y="418" width="214" height="36" rx="6" fill="#0078d4" fill-opacity="0.06" stroke="#0078d4" stroke-opacity="0.2" stroke-width="1"/>
  <text x="995" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#60a5fa" fill-opacity="0.7">App Insights · Log Analytics</text>

  <!-- Arrow marker defs -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0078d4" fill-opacity="0.5"/>
    </marker>
  </defs>
</svg>
