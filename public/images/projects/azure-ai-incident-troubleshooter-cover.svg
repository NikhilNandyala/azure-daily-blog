<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#50e6ff;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f38;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="900" cy="240" rx="380" ry="280" fill="#0078D4" fill-opacity="0.07" filter="url(#blur)"/>
  <ellipse cx="1100" cy="500" rx="200" ry="160" fill="#7c3aed" fill-opacity="0.05" filter="url(#blur)"/>
  <ellipse cx="200" cy="500" rx="250" ry="180" fill="#0078D4" fill-opacity="0.04" filter="url(#blur)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- AI + Incident badge -->
  <rect x="80" y="140" width="130" height="28" rx="14" fill="#0078D4" fill-opacity="0.15" stroke="#0078D4" stroke-opacity="0.4" stroke-width="1"/>
  <text x="145" y="159" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#60b8ff" letter-spacing="0.07em">AI · AZURE</text>

  <!-- Title -->
  <text x="80" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#e8f4ff" letter-spacing="-0.02em">Azure AI Incident</text>
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#e8f4ff" letter-spacing="-0.02em">Troubleshooter</text>

  <!-- Subtitle -->
  <text x="80" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#4a7fa8" letter-spacing="0.01em">GPT-4o · Cosmos DB 11 containers · RAG · AKS</text>

  <!-- Divider -->
  <line x1="80" y1="356" x2="520" y2="356" stroke="#0078D4" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Tags -->
  <rect x="80" y="370" width="68" height="22" rx="11" fill="#0078D4" fill-opacity="0.12" stroke="#0078D4" stroke-opacity="0.35" stroke-width="1"/>
  <text x="114" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#60b8ff">Cosmos DB</text>

  <rect x="158" y="370" width="52" height="22" rx="11" fill="#7c3aed" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
  <text x="184" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">FastAPI</text>

  <rect x="220" y="370" width="38" height="22" rx="11" fill="#0078D4" fill-opacity="0.1" stroke="#0078D4" stroke-opacity="0.25" stroke-width="1"/>
  <text x="239" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#60b8ff">RAG</text>

  <rect x="268" y="370" width="36" height="22" rx="11" fill="#7c3aed" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.25" stroke-width="1"/>
  <text x="286" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">AKS</text>

  <!-- Attribution -->
  <text x="80" y="428" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1a3554" letter-spacing="0.06em">AZUREFIXES.COM</text>

  <!-- Right side: mini architecture flow -->
  <!-- Incident input card -->
  <rect x="680" y="120" width="130" height="72" rx="6" fill="url(#cardGrad)" stroke="#0078D4" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="680" y="120" width="130" height="22" rx="6" fill="#0078D4" fill-opacity="0.6"/>
  <rect x="680" y="130" width="130" height="12" fill="#0078D4" fill-opacity="0.6"/>
  <text x="745" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff" letter-spacing="0.05em">INCIDENT</text>
  <text x="745" y="157" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#60b8ff">POST /incidents</text>
  <text x="745" y="173" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a7fa8">severity: critical</text>
  <text x="745" y="185" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a7fa8">service: AKS</text>

  <!-- Arrow down -->
  <line x1="745" y1="192" x2="745" y2="212" stroke="#0078D4" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 Z" fill="#0078D4" opacity="0.5"/>
    </marker>
    <marker id="arr-green" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 Z" fill="#107C10" opacity="0.6"/>
    </marker>
  </defs>

  <!-- GPT-4o + RAG card -->
  <rect x="670" y="214" width="150" height="86" rx="6" fill="url(#cardGrad)" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="670" y="214" width="150" height="22" rx="6" fill="#7c3aed" fill-opacity="0.5"/>
  <rect x="670" y="224" width="150" height="12" fill="#7c3aed" fill-opacity="0.5"/>
  <text x="745" y="229" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff" letter-spacing="0.05em">RAG ANALYSIS</text>
  <text x="745" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#c4b5fd">embed → search → GPT-4o</text>
  <text x="745" y="267" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b7fc4">AI Search top-5 runbooks</text>
  <text x="745" y="281" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b7fc4">confidence: 0.0 – 1.0</text>
  <text x="745" y="295" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b7fc4">temperature=0</text>

  <!-- Arrow down -->
  <line x1="745" y1="300" x2="745" y2="320" stroke="#107C10" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Cosmos DB split card -->
  <rect x="660" y="322" width="170" height="88" rx="6" fill="url(#cardGrad)" stroke="#107C10" stroke-opacity="0.3" stroke-width="1.5"/>
  <rect x="660" y="322" width="170" height="22" rx="6" fill="#107C10" fill-opacity="0.4"/>
  <rect x="660" y="332" width="170" height="12" fill="#107C10" fill-opacity="0.4"/>
  <text x="745" y="337" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff" letter-spacing="0.05em">COSMOS DB — 11 CONTAINERS</text>
  <text x="745" y="357" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#86efac">incidents  ·  analysisResults</text>
  <text x="745" y="370" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#86efac">recommendedActions  ·  incidentLogs</text>
  <text x="745" y="383" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#4a8a5a">runbooks  ·  feedback  ·  tags</text>
  <text x="745" y="396" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#4a8a5a">+ 4 more  ·  /incidentId partition</text>
  <text x="745" y="407" text-anchor="middle" font-family="monospace" font-size="8" fill="#2d6e3e">referenced entity model</text>

  <!-- Arrow down -->
  <line x1="745" y1="410" x2="745" y2="428" stroke="#0078D4" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Frontend output card -->
  <rect x="660" y="430" width="170" height="72" rx="6" fill="url(#cardGrad)" stroke="#0078D4" stroke-opacity="0.3" stroke-width="1.5"/>
  <rect x="660" y="430" width="170" height="22" rx="6" fill="#0078D4" fill-opacity="0.4"/>
  <rect x="660" y="440" width="170" height="12" fill="#0078D4" fill-opacity="0.4"/>
  <text x="745" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff" letter-spacing="0.05em">INCIDENT DETAIL</text>
  <text x="745" y="464" text-anchor="middle" font-family="monospace" font-size="9" fill="#60b8ff">P1 — Critical action</text>
  <text x="745" y="477" text-anchor="middle" font-family="monospace" font-size="9" fill="#60b8ff">P2 — High action</text>
  <text x="745" y="490" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a7fa8">Priority badges · Next.js</text>

  <!-- Phase count badge -->
  <rect x="660" y="518" width="170" height="40" rx="6" fill="#0a1628" stroke="#1e293b" stroke-width="1"/>
  <text x="745" y="534" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a7fa8" letter-spacing="0.05em">17 IMPLEMENTATION PHASES</text>
  <text x="745" y="550" text-anchor="middle" font-family="monospace" font-size="9" fill="#0078D4">6 architecture diagrams</text>

  <!-- Side label -->
  <text x="858" y="270" font-family="monospace" font-size="8.5" fill="#1a3554" text-anchor="middle" transform="rotate(90 858 270)">WORKLOAD IDENTITY · NO SECRETS</text>
</svg>
