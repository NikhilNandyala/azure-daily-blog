<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#0078D4"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="900" height="220" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Navy header banner -->
  <rect width="900" height="44" rx="6" fill="#003087"/>
  <rect x="0" y="30" width="900" height="14" fill="#003087"/>
  <text x="24" y="18" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="0.04em">DOCUMENT INGESTION PIPELINE</text>
  <text x="24" y="33" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#93C5FD">Upload → Chunk → Embed → Index  ·  Azure Blob Storage + AI Search + Azure OpenAI</text>

  <!-- Step boxes — 7 steps across 900px: start 18, width 108, gap 12 → (108×7)+(12×6)=828, start=(900-828)/2=36 -->
  <!-- Using start=18, box w=108, gap=10 → 7×108 + 6×10 = 756+60 = 816, margin=(900-816)/2=42 -->
  <!-- Let me use: x=22, w=110, gap=8 → 7×110+6×8=770+48=818, margin=(900-818)/2=41 -->

  <!-- Step 1: User Upload — BLUE -->
  <rect x="22" y="58" width="110" height="80" rx="5" fill="#EFF6FF" stroke="#0078D4" stroke-width="1.5"/>
  <rect x="22" y="58" width="110" height="22" rx="5" fill="#0078D4"/>
  <rect x="22" y="68" width="110" height="12" fill="#0078D4"/>
  <text x="77" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" letter-spacing="0.06em">STEP 1</text>
  <text x="77" y="92" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#1E3A5F">User Upload</text>
  <text x="77" y="107" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#0078D4">POST /upload</text>
  <text x="77" y="121" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">PDF / DOCX / TXT</text>
  <text x="77" y="133" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" fill="#6B7280">max 50 MB</text>

  <!-- Arrow 1→2 -->
  <line x1="132" y1="98" x2="148" y2="98" stroke="#0078D4" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Blob Storage — PURPLE -->
  <rect x="150" y="58" width="110" height="80" rx="5" fill="#F5F3FF" stroke="#7719AA" stroke-width="1.5"/>
  <rect x="150" y="58" width="110" height="22" rx="5" fill="#7719AA"/>
  <rect x="150" y="68" width="110" height="12" fill="#7719AA"/>
  <text x="205" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" letter-spacing="0.06em">STEP 2</text>
  <text x="205" y="92" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#3B0764">Blob Storage</text>
  <text x="205" y="107" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#7719AA">docs container</text>
  <text x="205" y="121" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">Raw file stored</text>
  <text x="205" y="133" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" fill="#6B7280">Standard LRS</text>

  <!-- Arrow 2→3 -->
  <line x1="260" y1="98" x2="276" y2="98" stroke="#0078D4" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: FastAPI Ingest — BLUE -->
  <rect x="278" y="58" width="110" height="80" rx="5" fill="#EFF6FF" stroke="#0078D4" stroke-width="1.5"/>
  <rect x="278" y="58" width="110" height="22" rx="5" fill="#0078D4"/>
  <rect x="278" y="68" width="110" height="12" fill="#0078D4"/>
  <text x="333" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" letter-spacing="0.06em">STEP 3</text>
  <text x="333" y="92" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#1E3A5F">FastAPI</text>
  <text x="333" y="107" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#0078D4">ingest endpoint</text>
  <text x="333" y="121" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">Reads from storage</text>
  <text x="333" y="133" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" fill="#6B7280">extracts text</text>

  <!-- Arrow 3→4 -->
  <line x1="388" y1="98" x2="404" y2="98" stroke="#0078D4" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Chunker — AMBER -->
  <rect x="406" y="58" width="110" height="80" rx="5" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <rect x="406" y="58" width="110" height="22" rx="5" fill="#D97706"/>
  <rect x="406" y="68" width="110" height="12" fill="#D97706"/>
  <text x="461" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" letter-spacing="0.06em">STEP 4</text>
  <text x="461" y="92" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#78350F">Chunker</text>
  <text x="461" y="107" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#D97706">512 tok / 64 overlap</text>
  <text x="461" y="121" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">LangChain splitter</text>
  <text x="461" y="133" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" fill="#6B7280">recursive char</text>

  <!-- Arrow 4→5 -->
  <line x1="516" y1="98" x2="532" y2="98" stroke="#0078D4" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5: Embeddings — PURPLE -->
  <rect x="534" y="58" width="110" height="80" rx="5" fill="#F5F3FF" stroke="#7719AA" stroke-width="1.5"/>
  <rect x="534" y="58" width="110" height="22" rx="5" fill="#7719AA"/>
  <rect x="534" y="68" width="110" height="12" fill="#7719AA"/>
  <text x="589" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" letter-spacing="0.06em">STEP 5</text>
  <text x="589" y="92" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#3B0764">Embeddings</text>
  <text x="589" y="107" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#7719AA">text-embedding-3-small</text>
  <text x="589" y="121" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">Azure OpenAI</text>
  <text x="589" y="133" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" fill="#6B7280">1536-dim vectors</text>

  <!-- Arrow 5→6 -->
  <line x1="644" y1="98" x2="660" y2="98" stroke="#0078D4" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 6: AI Search — BLUE -->
  <rect x="662" y="58" width="110" height="80" rx="5" fill="#EFF6FF" stroke="#0078D4" stroke-width="1.5"/>
  <rect x="662" y="58" width="110" height="22" rx="5" fill="#0078D4"/>
  <rect x="662" y="68" width="110" height="12" fill="#0078D4"/>
  <text x="717" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" letter-spacing="0.06em">STEP 6</text>
  <text x="717" y="92" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#1E3A5F">AI Search Index</text>
  <text x="717" y="107" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#0078D4">vector + BM25</text>
  <text x="717" y="121" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">hybrid index</text>
  <text x="717" y="133" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" fill="#6B7280">HNSW algorithm</text>

  <!-- Arrow 6→7 -->
  <line x1="772" y1="98" x2="788" y2="98" stroke="#107C10" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 7: Done — GREEN -->
  <rect x="790" y="58" width="88" height="80" rx="5" fill="#F0FDF4" stroke="#107C10" stroke-width="1.5"/>
  <rect x="790" y="58" width="88" height="22" rx="5" fill="#107C10"/>
  <rect x="790" y="68" width="88" height="12" fill="#107C10"/>
  <text x="834" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" letter-spacing="0.06em">DONE</text>
  <text x="834" y="96" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" fill="#107C10">✓</text>
  <text x="834" y="116" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">Indexed</text>
  <text x="834" y="130" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" fill="#6B7280">ready for queries</text>

  <!-- Footer — Key design points -->
  <rect x="22" y="152" width="856" height="54" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="36" y="168" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" font-weight="700" fill="#1E40AF" letter-spacing="0.05em">KEY DESIGN POINTS</text>
  <text x="36" y="184" font-family="'Courier New', monospace" font-size="9.5" fill="#1E3A5F">Each chunk stored as JSON: { id, content, embedding[1536], source_file, page_number, chunk_index }</text>
  <text x="36" y="198" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#374151">Chunks overlap by 64 tokens so context is preserved across boundaries.  Batches of 100 sent to embeddings API to minimise round-trips.</text>
</svg>
