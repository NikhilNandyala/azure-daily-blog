<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">

  <!-- Canvas -->
  <rect width="900" height="280" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Navy header banner -->
  <rect width="900" height="44" rx="6" fill="#003087"/>
  <rect x="0" y="30" width="900" height="14" fill="#003087"/>
  <text x="24" y="18" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="0.04em">DEFENSE IN DEPTH — 4 SECURITY LAYERS</text>
  <text x="24" y="33" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#93C5FD">An attacker must independently breach every layer — failure at any one stops the attack chain</text>

  <!-- LAYER 1: Network — BLUE -->
  <rect x="22" y="56" width="202" height="178" rx="5" fill="#EFF6FF" stroke="#0078D4" stroke-width="1.5"/>
  <rect x="22" y="56" width="202" height="28" rx="5" fill="#0078D4"/>
  <rect x="22" y="72" width="202" height="12" fill="#0078D4"/>
  <text x="123" y="73" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" letter-spacing="0.05em">LAYER 1 — NETWORK</text>
  <line x1="38" y1="98" x2="208" y2="98" stroke="#BFDBFE" stroke-width="1"/>
  <text x="42" y="114" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#1E3A5F">▸ VNet</text>
  <text x="58" y="127" font-family="'Courier New', monospace" font-size="9" fill="#0078D4">10.0.0.0/16</text>
  <text x="42" y="143" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#1E3A5F">▸ NSG</text>
  <text x="58" y="156" font-family="'Courier New', monospace" font-size="9" fill="#0078D4">deny all inbound</text>
  <text x="42" y="172" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#1E3A5F">▸ AKS private cluster</text>
  <text x="58" y="185" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">No public node IPs</text>
  <text x="42" y="201" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#1E3A5F">▸ TLS 1.3 at edge</text>
  <text x="58" y="214" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">NGINX Ingress + cert-manager</text>
  <text x="42" y="228" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#6B7280">Private DNS zones</text>

  <!-- LAYER 2: Identity — PURPLE -->
  <rect x="234" y="56" width="202" height="178" rx="5" fill="#F5F3FF" stroke="#7719AA" stroke-width="1.5"/>
  <rect x="234" y="56" width="202" height="28" rx="5" fill="#7719AA"/>
  <rect x="234" y="72" width="202" height="12" fill="#7719AA"/>
  <text x="335" y="73" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" letter-spacing="0.05em">LAYER 2 — IDENTITY</text>
  <line x1="250" y1="98" x2="420" y2="98" stroke="#DDD6FE" stroke-width="1"/>
  <text x="254" y="114" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#3B0764">▸ Workload Identity</text>
  <text x="270" y="127" font-family="'Courier New', monospace" font-size="9" fill="#7719AA">OIDC federation</text>
  <text x="254" y="143" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#3B0764">▸ Managed Identity</text>
  <text x="270" y="156" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">No client secrets in code</text>
  <text x="254" y="172" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#3B0764">▸ RBAC least-privilege</text>
  <text x="270" y="185" font-family="'Courier New', monospace" font-size="9" fill="#7719AA">Key Vault Secrets User</text>
  <text x="254" y="201" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#3B0764">▸ No cluster-admin</text>
  <text x="270" y="214" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">Pod-scoped permissions</text>
  <text x="254" y="228" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#6B7280">Entra ID OIDC auth</text>

  <!-- LAYER 3: Data — AMBER -->
  <rect x="446" y="56" width="202" height="178" rx="5" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <rect x="446" y="56" width="202" height="28" rx="5" fill="#D97706"/>
  <rect x="446" y="72" width="202" height="12" fill="#D97706"/>
  <text x="547" y="73" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" letter-spacing="0.05em">LAYER 3 — DATA</text>
  <line x1="462" y1="98" x2="632" y2="98" stroke="#FDE68A" stroke-width="1"/>
  <text x="466" y="114" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#78350F">▸ Key Vault secrets</text>
  <text x="482" y="127" font-family="'Courier New', monospace" font-size="9" fill="#D97706">soft-delete 90 days</text>
  <text x="466" y="143" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#78350F">▸ Encryption at rest</text>
  <text x="482" y="156" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">AES-256, MS-managed key</text>
  <text x="466" y="172" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#78350F">▸ TLS in transit</text>
  <text x="482" y="185" font-family="'Courier New', monospace" font-size="9" fill="#D97706">TLS 1.2+ enforced</text>
  <text x="466" y="201" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#78350F">▸ Private endpoints</text>
  <text x="482" y="214" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">Blob Storage + AI Search</text>
  <text x="466" y="228" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#6B7280">No public data-plane access</text>

  <!-- LAYER 4: Application — RED -->
  <rect x="658" y="56" width="220" height="178" rx="5" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="658" y="56" width="220" height="28" rx="5" fill="#DC2626"/>
  <rect x="658" y="72" width="220" height="12" fill="#DC2626"/>
  <text x="768" y="73" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" letter-spacing="0.05em">LAYER 4 — APPLICATION</text>
  <line x1="674" y1="98" x2="862" y2="98" stroke="#FECACA" stroke-width="1"/>
  <text x="678" y="114" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#7F1D1D">▸ Rate limiting</text>
  <text x="694" y="127" font-family="'Courier New', monospace" font-size="9" fill="#DC2626">100 req/min per IP</text>
  <text x="678" y="143" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#7F1D1D">▸ Input validation</text>
  <text x="694" y="156" font-family="'Courier New', monospace" font-size="9" fill="#DC2626">50 KB max, allow-list types</text>
  <text x="678" y="172" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#7F1D1D">▸ Prompt injection guard</text>
  <text x="694" y="185" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#374151">Pattern match + Content Safety</text>
  <text x="678" y="201" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#7F1D1D">▸ CORS + Security headers</text>
  <text x="694" y="214" font-family="'Courier New', monospace" font-size="9" fill="#DC2626">HSTS + CSP + X-Frame</text>
  <text x="678" y="228" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#6B7280">JWT validation on every request</text>

  <!-- Footer -->
  <rect x="22" y="244" width="856" height="26" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="36" y="261" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#374151"><tspan font-weight="700" fill="#1E40AF">KEY DESIGN POINT  </tspan>Each layer is independently enforced. Workload Identity (Layer 2) removes the need for any secret in Layer 3. Layers 3 and 4 remain effective even if Layers 1–2 are misconfigured.</text>
</svg>
