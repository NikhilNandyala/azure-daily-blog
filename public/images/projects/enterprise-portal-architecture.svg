  <text x="44" y="352" font-family="monospace" font-size="9" fill="#c8860a" fill-opacity="0.4" letter-spacing="0.06em">SHARED SERVICES</text>

  <!-- Key Vault -->
  <rect x="60" y="362" width="110" height="48" rx="6" fill="rgba(10,22,40,0.6)" stroke="#c8860a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="115" y="381" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#d4a843">Key Vault</text>
  <text x="115" y="397" text-anchor="middle" font-family="monospace" font-size="9" fill="#8a7a5a">Secrets · Certs</text>

