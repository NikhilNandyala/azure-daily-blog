  <text x="1056" y="323" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#60a5fa">Log Analytics</text>
  <text x="1056" y="340" text-anchor="middle" font-family="monospace" font-size="10" fill="#8a7a5a">KQL · Dashboards · Alerts</text>

  <!-- Entra ID -->
  <rect x="958" y="374" width="196" height="60" rx="8" fill="rgba(10,22,40,0.8)" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="1056" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#c4b5fd">Entra ID</text>
  <text x="1056" y="414" text-anchor="middle" font-family="monospace" font-size="10" fill="#8a7a5a">AuthN · RBAC · Cond. Access</text>

  <!-- Arrows from VNet box to Monitoring -->
  <line x1="908" y1="283" x2="958" y2="283" stroke="#0078d4" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="908" y1="380" x2="958" y2="380" stroke="#0078d4" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ─────────────────────────────── CI/CD PIPELINE ────────────────────────── -->
  <text x="28" y="524" font-family="monospace" font-size="11" fill="#22c55e" fill-opacity="0.6" letter-spacing="0.06em">CI/CD PIPELINE (Azure DevOps)</text>

  <!-- Pipeline stages -->
  <rect x="28" y="536" width="130" height="46" rx="6" fill="rgba(10,22,40,0.8)" stroke="#22c55e" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="93" y="557" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#86efac">Build + Test</text>
  <text x="93" y="572" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e" fill-opacity="0.6">.NET + React + Scan</text>

  <line x1="158" y1="559" x2="194" y2="559" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <rect x="194" y="536" width="110" height="46" rx="6" fill="rgba(10,22,40,0.8)" stroke="#22c55e" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="249" y="557" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#86efac">DEV Deploy</text>
  <text x="249" y="572" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e" fill-opacity="0.6">Terraform + App + E2E</text>

  <line x1="304" y1="559" x2="340" y2="559" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Approval gate 1 -->
  <rect x="340" y="545" width="60" height="28" rx="14" fill="#c8860a" fill-opacity="0.15" stroke="#c8860a" stroke-opacity="0.5" stroke-width="1"/>
  <text x="370" y="563" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0a500">✓ Gate</text>
  <line x1="400" y1="559" x2="432" y2="559" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <rect x="432" y="536" width="110" height="46" rx="6" fill="rgba(10,22,40,0.8)" stroke="#22c55e" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="487" y="557" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#86efac">UAT Deploy</text>
  <text x="487" y="572" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e" fill-opacity="0.6">Approval Gate</text>

  <line x1="542" y1="559" x2="578" y2="559" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Approval gate 2 -->
  <rect x="578" y="545" width="60" height="28" rx="14" fill="#c8860a" fill-opacity="0.15" stroke="#c8860a" stroke-opacity="0.5" stroke-width="1"/>
  <text x="608" y="563" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0a500">✓ Gate</text>
  <line x1="638" y1="559" x2="672" y2="559" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <rect x="672" y="536" width="150" height="46" rx="6" fill="rgba(10,22,40,0.8)" stroke="#22c55e" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="747" y="557" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#86efac">PROD Deploy</text>
  <text x="747" y="572" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e" fill-opacity="0.6">Blue/Green · Health Check</text>

  <!-- Playwright badge -->
  <rect x="840" y="540" width="150" height="38" rx="6" fill="#0078d4" fill-opacity="0.1" stroke="#0078d4" stroke-opacity="0.35" stroke-width="1"/>
  <text x="915" y="556" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#60a5fa">Playwright E2E</text>
  <text x="915" y="571" text-anchor="middle" font-family="monospace" font-size="9" fill="#0078d4" fill-opacity="0.6">Chrome · Firefox · Safari · Mobile</text>

  <!-- IaC badge -->
  <rect x="1004" y="540" width="150" height="38" rx="6" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1079" y="556" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#f0a500">Terraform IaC</text>
  <text x="1079" y="571" text-anchor="middle" font-family="monospace" font-size="9" fill="#c8860a" fill-opacity="0.6">azurerm ~4.0 · Remote State</text>

  <!-- Bottom attribution -->
  <line x1="28" y1="604" x2="1172" y2="604" stroke="#c8860a" stroke-opacity="0.1" stroke-width="1"/>
  <text x="600" y="624" text-anchor="middle" font-family="monospace" font-size="11" fill="#5a4a2a" letter-spacing="0.06em">AZUREFIXES.COM — Enterprise Customer Portal Reference Architecture</text>
