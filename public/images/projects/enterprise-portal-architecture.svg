<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#081220"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 Z" fill="#c8860a" fill-opacity="0.6"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 Z" fill="#0078d4" fill-opacity="0.6"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 Z" fill="#22c55e" fill-opacity="0.6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#ffeaa0" letter-spacing="0.02em">Enterprise Customer Portal — Azure Architecture</text>
  <line x1="200" y1="56" x2="1000" y2="56" stroke="#c8860a" stroke-opacity="0.2" stroke-width="1"/>

  <!-- ─────────────────────────────── EDGE LAYER ─────────────────────────────── -->
  <!-- Section label -->
  <text x="28" y="100" font-family="monospace" font-size="11" fill="#0078d4" fill-opacity="0.6" letter-spacing="0.06em">EDGE</text>

  <!-- Users -->
  <rect x="50" y="108" width="110" height="48" rx="8" fill="#0078d4" fill-opacity="0.1" stroke="#0078d4" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="105" y="129" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#60a5fa">Users</text>
  <text x="105" y="147" text-anchor="middle" font-family="monospace" font-size="10" fill="#0078d4" fill-opacity="0.6">Browser / Mobile</text>

  <!-- Arrow: Users → Front Door -->
  <line x1="160" y1="132" x2="234" y2="132" stroke="#0078d4" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="197" y="126" text-anchor="middle" font-family="monospace" font-size="9" fill="#0078d4" fill-opacity="0.5">HTTPS</text>

  <!-- Front Door -->
  <rect x="234" y="108" width="180" height="48" rx="8" fill="#0078d4" fill-opacity="0.1" stroke="#0078d4" stroke-opacity="0.5" stroke-width="2"/>
  <text x="324" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#60a5fa">Azure Front Door</text>
  <text x="324" y="146" text-anchor="middle" font-family="monospace" font-size="10" fill="#0078d4" fill-opacity="0.6">Premium · DDoS · Global TLS</text>

  <!-- Arrow: Front Door → App Gateway -->
  <line x1="414" y1="132" x2="488" y2="132" stroke="#0078d4" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- App Gateway WAF -->
  <rect x="488" y="108" width="200" height="48" rx="8" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.5" stroke-width="2"/>
  <text x="588" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#f0a500">App Gateway WAF</text>
  <text x="588" y="146" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8860a" fill-opacity="0.6">WAF_v2 · L7 Routing · SSL Offload</text>

  <!-- Arrow: App GW down into VNet -->
  <line x1="588" y1="156" x2="588" y2="196" stroke="#c8860a" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─────────────────────────────── VNET BOX ──────────────────────────────── -->
  <rect x="28" y="196" width="880" height="300" rx="12" fill="none" stroke="#c8860a" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="42" y="214" font-family="monospace" font-size="10" fill="#c8860a" fill-opacity="0.4" letter-spacing="0.08em">VNet: enterprise-vnet  10.0.0.0/16</text>

  <!-- app-subnet label -->
  <rect x="44" y="222" width="540" height="200" rx="8" fill="#0078d4" fill-opacity="0.03" stroke="#0078d4" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="56" y="238" font-family="monospace" font-size="9" fill="#0078d4" fill-opacity="0.4">app-subnet  10.0.1.0/24</text>

  <!-- Frontend App Service -->
  <rect x="60" y="248" width="200" height="70" rx="8" fill="rgba(10,22,40,0.8)" stroke="#c8860a" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="160" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffeaa0">Frontend</text>
  <text x="160" y="285" text-anchor="middle" font-family="monospace" font-size="10" fill="#b8a882">Azure App Service</text>
  <text x="160" y="302" text-anchor="middle" font-family="monospace" font-size="9" fill="#c8860a" fill-opacity="0.6">React · HTTPS only · Autoscale</text>

  <!-- Arrow: Frontend ↔ Backend -->
  <line x1="260" y1="283" x2="320" y2="283" stroke="#c8860a" stroke-opacity="0.35" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Backend API -->
  <rect x="320" y="248" width="210" height="70" rx="8" fill="rgba(10,22,40,0.8)" stroke="#0078d4" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="425" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffeaa0">Backend API</text>
  <text x="425" y="285" text-anchor="middle" font-family="monospace" font-size="10" fill="#b8a882">Azure App Service</text>
  <text x="425" y="302" text-anchor="middle" font-family="monospace" font-size="9" fill="#0078d4" fill-opacity="0.6">.NET 8 · Managed Identity</text>

  <!-- Arrow: Backend → SQL (right) -->
  <line x1="530" y1="283" x2="610" y2="283" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="570" y="276" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa" fill-opacity="0.6">Private EP</text>

  <!-- data-subnet label -->
  <rect x="610" y="222" width="280" height="200" rx="8" fill="#a78bfa" fill-opacity="0.03" stroke="#a78bfa" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="622" y="238" font-family="monospace" font-size="9" fill="#a78bfa" fill-opacity="0.4">data-subnet  10.0.2.0/24</text>

  <!-- Azure SQL -->
  <rect x="626" y="248" width="220" height="70" rx="8" fill="rgba(10,22,40,0.8)" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="736" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffeaa0">Azure SQL Database</text>
  <text x="736" y="285" text-anchor="middle" font-family="monospace" font-size="10" fill="#b8a882">Private Endpoint · Zone Redundant</text>
  <text x="736" y="302" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa" fill-opacity="0.6">Public access DISABLED · TLS 1.2</text>

