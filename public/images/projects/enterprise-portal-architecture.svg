  <rect x="426" y="362" width="110" height="48" rx="6" fill="rgba(10,22,40,0.6)" stroke="#c8860a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="481" y="381" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#d4a843">Redis Cache</text>
