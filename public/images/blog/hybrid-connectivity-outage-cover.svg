<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8860a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:0.04"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="820" cy="220" rx="320" ry="260" fill="url(#red-glow)" filter="url(#blur)"/>
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Troubleshooting badge -->
  <rect x="80" y="140" width="168" height="28" rx="14" fill="#dc2626" fill-opacity="0.15" stroke="#f87171" stroke-opacity="0.4" stroke-width="1"/>
  <text x="164" y="159" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" letter-spacing="0.07em">TROUBLESHOOTING</text>

  <!-- Title -->
  <text x="80" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Hybrid Connectivity</text>
  <text x="80" y="286" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Outage</text>

  <!-- Subtitle -->
  <text x="80" y="334" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a89060" letter-spacing="0.01em">ExpressRoute Gateway control-plane failure → 25 min failover</text>

  <!-- Divider -->
  <line x1="80" y1="368" x2="500" y2="368" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Tags -->
  <rect x="80" y="382" width="90" height="22" rx="11" fill="#dc2626" fill-opacity="0.1" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <text x="125" y="397" text-anchor="middle" font-family="monospace" font-size="11" fill="#fca5a5">ExpressRoute</text>

  <rect x="180" y="382" width="46" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="203" y="397" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4a843">BGP</text>

  <rect x="236" y="382" width="68" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="270" y="397" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4a843">Failover</text>

  <rect x="314" y="382" width="36" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="332" y="397" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4a843">HA</text>

  <!-- Attribution -->
  <text x="80" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#5a4a2a" letter-spacing="0.06em">AZUREFIXES.COM</text>

  <!-- Right side: network topology illustration -->
  <!-- On-prem box -->
  <rect x="740" y="140" width="140" height="80" rx="10" fill="#0a1628" stroke="#4b5563" stroke-width="1.5"/>
  <text x="810" y="174" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#d1d5db">On-Premises</text>
  <text x="810" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b7280">AS 65010</text>
  <circle cx="810" cy="161" r="10" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="810" y="165" text-anchor="middle" font-family="monospace" font-size="10" fill="#9ca3af">DC</text>

  <!-- Broken link indicator -->
  <line x1="880" y1="180" x2="940" y2="180" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/>
  <!-- Red X on link -->
  <circle cx="910" cy="180" r="14" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5"/>
  <text x="910" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f87171">✕</text>

  <!-- Azure GW box (red/failed) -->
  <rect x="940" y="140" width="140" height="80" rx="10" fill="#1a0a0a" stroke="#dc2626" stroke-width="2"/>
  <text x="1010" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f87171">ER Gateway</text>
  <text x="1010" y="184" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626" fill-opacity="0.8">Control Plane ✕</text>
  <text x="1010" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="#f87171" font-weight="600">BGP: Connected</text>
  <text x="1010" y="214" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">Data: DROPPING</text>

  <!-- Arrow down to failover -->
  <line x1="1010" y1="220" x2="1010" y2="262" stroke="#c8860a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1020" y="248" font-family="monospace" font-size="10" fill="#c8860a" fill-opacity="0.6">failover</text>

  <!-- Secondary GW (green/healthy) -->
  <rect x="940" y="262" width="140" height="80" rx="10" fill="#0a1a0a" stroke="#16a34a" stroke-width="2"/>
  <text x="1010" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#22c55e">ER Gateway</text>
  <text x="1010" y="306" text-anchor="middle" font-family="monospace" font-size="9" fill="#16a34a">Secondary Region</text>
  <text x="1010" y="322" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e" font-weight="600">✓ Traffic restored</text>
  <text x="1010" y="336" text-anchor="middle" font-family="monospace" font-size="9" fill="#16a34a">in 25 min</text>

  <!-- Status bar -->
  <rect x="740" y="380" width="340" height="60" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="760" y="402" font-family="monospace" font-size="10" fill="#4b5563" letter-spacing="0.05em">INCIDENT SUMMARY</text>
  <text x="760" y="420" font-family="monospace" font-size="11" fill="#f87171">⬤  Impact: 47 min · 12 on-prem sites</text>
  <text x="760" y="436" font-family="monospace" font-size="11" fill="#22c55e">⬤  Recovery: 25 min regional failover</text>

  <!-- Timeline markers -->
  <text x="760" y="476" font-family="monospace" font-size="10" fill="#5a4a2a">03:14 UTC — Alert · 03:47 — Triage · 04:09 — Root cause · 04:34 — Restored</text>
</svg>
