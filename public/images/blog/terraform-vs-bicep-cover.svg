<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8860a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="glow-tf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="glow-bi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8860a;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0.04"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="45"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Dual glows for Terraform (purple left) and Bicep (amber right) -->
  <ellipse cx="300" cy="400" rx="320" ry="260" fill="url(#glow-tf)" filter="url(#blur)"/>
  <ellipse cx="1050" cy="250" rx="280" ry="240" fill="url(#glow-bi)" filter="url(#blur)"/>

  <rect x="0" y="0" width="1200" height="5" fill="url(#accent1)"/>

  <!-- Grid lines -->
  <line x1="0" y1="530" x2="1200" y2="530" stroke="#c8860a" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#c8860a" stroke-opacity="0.04" stroke-width="1"/>

  <!-- postType badge -->
  <rect x="80" y="140" width="140" height="28" rx="14" fill="#7c3aed" fill-opacity="0.15" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1"/>
  <text x="150" y="159" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#c4b5fd" letter-spacing="0.08em">ARCHITECTURE</text>

  <!-- Title line 1 -->
  <text x="80" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="54" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Terraform</text>

  <!-- VS divider -->
  <text x="80" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#c8860a" fill-opacity="0.6" letter-spacing="0.08em">vs</text>

  <!-- Title line 2 -->
  <text x="120" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="54" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Bicep</text>

  <!-- Subtitle -->
  <text x="80" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#a89060" letter-spacing="0.01em">Choosing IaC for Azure in 2026</text>

  <!-- Divider -->
  <line x1="80" y1="388" x2="520" y2="388" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Tag chips -->
  <rect x="80" y="402" width="86" height="22" rx="11" fill="#7c3aed" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
  <text x="123" y="417" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">Terraform</text>

  <rect x="176" y="402" width="58" height="22" rx="11" fill="#c8860a" fill-opacity="0.12" stroke="#c8860a" stroke-opacity="0.35" stroke-width="1"/>
  <text x="205" y="417" text-anchor="middle" font-family="monospace" font-size="11" fill="#f0a500">Bicep</text>

  <rect x="244" y="402" width="54" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="271" y="417" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4a843">Azure</text>

  <rect x="308" y="402" width="42" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="329" y="417" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4a843">IaC</text>

  <rect x="360" y="402" width="66" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="393" y="417" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4a843">DevOps</text>

  <!-- Attribution -->
  <text x="80" y="458" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#5a4a2a" letter-spacing="0.06em">AZUREFIXES.COM</text>

  <!-- Right side: visual duel -->
  <!-- Terraform block (purple) -->
  <rect x="760" y="148" width="180" height="180" rx="12" fill="#7c3aed" fill-opacity="0.08" stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- TF logo mark -->
  <text x="850" y="205" text-anchor="middle" font-family="monospace" font-size="48" font-weight="800" fill="#a78bfa" fill-opacity="0.8">TF</text>
  <text x="850" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#c4b5fd">Terraform</text>
  <text x="850" y="256" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa" fill-opacity="0.6">HashiCorp HCL</text>
  <text x="850" y="273" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa" fill-opacity="0.5">Multi-cloud · State · OSS</text>
  <text x="850" y="315" text-anchor="middle" font-family="monospace" font-size="11" fill="#7c3aed" fill-opacity="0.5">provider "azurerm" {}</text>

  <!-- VS badge between them -->
  <circle cx="1000" cy="238" r="28" fill="#050d1a" stroke="#c8860a" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="1000" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#c8860a">VS</text>

  <!-- Bicep block (amber) -->
  <rect x="1030" y="148" width="140" height="180" rx="12" fill="#c8860a" fill-opacity="0.07" stroke="#c8860a" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="1100" y="205" text-anchor="middle" font-family="monospace" font-size="48" font-weight="800" fill="#f0a500" fill-opacity="0.8">BI</text>
  <text x="1100" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f0a500">Bicep</text>
  <text x="1100" y="256" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8860a" fill-opacity="0.6">Microsoft DSL</text>
  <text x="1100" y="273" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8860a" fill-opacity="0.5">Azure-only · No state</text>
  <text x="1100" y="315" text-anchor="middle" font-family="monospace" font-size="11" fill="#c8860a" fill-opacity="0.5">resource 'sa' 'ST' = {}</text>

  <!-- Outcome: "or both?" -->
  <rect x="820" y="370" width="340" height="44" rx="8" fill="rgba(200,134,10,0.07)" stroke="#c8860a" stroke-opacity="0.2" stroke-width="1"/>
  <text x="990" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#d4a843">The answer: usually both.</text>
</svg>
