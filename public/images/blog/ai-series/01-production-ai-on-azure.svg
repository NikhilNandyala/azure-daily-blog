<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8860a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow orb -->
  <ellipse cx="900" cy="200" rx="350" ry="280" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent1)"/>
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#c8860a" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#c8860a" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#c8860a" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="530" x2="1200" y2="530" stroke="#c8860a" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#c8860a" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#c8860a" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Badge pill: postType -->
  <rect x="80" y="140" width="90" height="28" rx="14" fill="#f472b6" fill-opacity="0.15" stroke="#f472b6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="125" y="159" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#f9a8d4" letter-spacing="0.08em">AI</text>
  <!-- Post number -->
  <text x="80" y="224" font-family="system-ui, -apple-system, monospace" font-size="13" fill="#c8860a" fill-opacity="0.6" letter-spacing="0.12em">01 —</text>
  <!-- Title -->
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Production AI</text>
  <text x="80" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">on Azure</text>
  <!-- Subtitle -->
  <text x="80" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a89060" letter-spacing="0.01em">What Actually Breaks at Scale</text>
  <!-- Divider line -->
  <line x1="80" y1="450" x2="480" y2="450" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Meta -->
  <text x="80" y="478" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7a6a4a" letter-spacing="0.06em">AZUREFIXES.COM</text>
  <!-- Decorative dots right side -->
  <circle cx="1050" cy="315" r="120" fill="none" stroke="#c8860a" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="1050" cy="315" r="80" fill="none" stroke="#c8860a" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="1050" cy="315" r="40" fill="#c8860a" fill-opacity="0.06"/>
  <!-- Icon: lightning bolt (AI/scale) -->
  <path d="M1040 265 L1020 320 L1045 320 L1030 370 L1080 305 L1055 305 Z" fill="#f0a500" fill-opacity="0.5" stroke="#f0a500" stroke-opacity="0.8" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
