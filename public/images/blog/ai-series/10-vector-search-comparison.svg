<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8860a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="200" rx="350" ry="280" fill="#a78bfa" fill-opacity="0.07" filter="url(#blur)"/>
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent1)"/>
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#c8860a" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="530" x2="1200" y2="530" stroke="#c8860a" stroke-opacity="0.06" stroke-width="1"/>
  <!-- Badge -->
  <rect x="80" y="140" width="140" height="28" rx="14" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1"/>
  <text x="150" y="159" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#c4b5fd" letter-spacing="0.08em">ARCHITECTURE</text>
  <text x="80" y="224" font-family="system-ui, -apple-system, monospace" font-size="13" fill="#c8860a" fill-opacity="0.6" letter-spacing="0.12em">10 —</text>
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Vector Search</text>
  <text x="80" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">on Azure</text>
  <text x="80" y="408" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a89060" letter-spacing="0.01em">AI Search vs Cosmos DB vs PostgreSQL</text>
  <line x1="80" y1="450" x2="480" y2="450" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="80" y="478" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7a6a4a" letter-spacing="0.06em">AZUREFIXES.COM</text>
  <!-- Three service comparison bars -->
  <text x="940" y="225" font-family="system-ui, sans-serif" font-size="11" fill="#c8860a" fill-opacity="0.6">AI Search</text>
  <rect x="940" y="232" width="200" height="18" rx="3" fill="#c8860a" fill-opacity="0.7"/>
  <text x="940" y="272" font-family="system-ui, sans-serif" font-size="11" fill="#a78bfa" fill-opacity="0.6">Cosmos DB</text>
  <rect x="940" y="279" width="150" height="18" rx="3" fill="#a78bfa" fill-opacity="0.6"/>
  <text x="940" y="319" font-family="system-ui, sans-serif" font-size="11" fill="#2899f5" fill-opacity="0.6">PostgreSQL</text>
  <rect x="940" y="326" width="120" height="18" rx="3" fill="#2899f5" fill-opacity="0.5"/>
  <text x="940" y="370" font-family="monospace" font-size="10" fill="#f0a500" fill-opacity="0.5">← recall accuracy</text>
  <!-- Dots pattern -->
  <circle cx="1050" cy="430" r="3" fill="#c8860a" fill-opacity="0.2"/>
  <circle cx="1070" cy="430" r="3" fill="#c8860a" fill-opacity="0.2"/>
  <circle cx="1090" cy="430" r="3" fill="#c8860a" fill-opacity="0.2"/>
  <circle cx="1110" cy="430" r="3" fill="#c8860a" fill-opacity="0.2"/>
  <circle cx="1130" cy="430" r="3" fill="#c8860a" fill-opacity="0.2"/>
  <circle cx="1050" cy="450" r="3" fill="#c8860a" fill-opacity="0.1"/>
  <circle cx="1070" cy="450" r="3" fill="#c8860a" fill-opacity="0.1"/>
  <circle cx="1090" cy="450" r="3" fill="#c8860a" fill-opacity="0.1"/>
  <circle cx="1110" cy="450" r="3" fill="#c8860a" fill-opacity="0.1"/>
  <circle cx="1130" cy="450" r="3" fill="#c8860a" fill-opacity="0.1"/>
</svg>
