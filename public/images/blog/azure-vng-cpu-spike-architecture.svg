<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="740" viewBox="0 0 1200 740">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 Z" fill="#1d4ed8" fill-opacity="0.7"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 Z" fill="#16a34a" fill-opacity="0.7"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 Z" fill="#dc2626" fill-opacity="0.7"/>
    </marker>
  </defs>

  <!-- White background for dark-mode compatibility -->
  <rect width="1200" height="740" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b" letter-spacing="0.01em">Azure VPN Gateway — Before vs After Route Summarization</text>
  <line x1="80" y1="48" x2="1120" y2="48" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ═══════════════════════ BEFORE (top half) ═══════════════════════ -->
  <rect x="0" y="56" width="1200" height="300" fill="#fff5f5"/>
  <text x="16" y="76" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#dc2626" letter-spacing="0.06em">BEFORE — BGP Route Explosion (2,400+ prefixes)</text>

  <!-- On-prem DC (BEFORE) -->
  <rect x="60" y="90" width="200" height="200" rx="10" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="160" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Corporate DC</text>
  <text x="160" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">On-Premises</text>
  <!-- Route table (messy) -->
  <rect x="76" y="138" width="168" height="136" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="160" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626" font-weight="600">Advertised Routes (BGP)</text>
  <text x="84" y="170" font-family="monospace" font-size="8.5" fill="#7f1d1d">10.10.1.0/30</text>
  <text x="84" y="183" font-family="monospace" font-size="8.5" fill="#7f1d1d">10.10.1.4/30</text>
  <text x="84" y="196" font-family="monospace" font-size="8.5" fill="#7f1d1d">10.10.1.8/30</text>
  <text x="84" y="209" font-family="monospace" font-size="8.5" fill="#7f1d1d">10.10.2.0/30</text>
  <text x="84" y="222" font-family="monospace" font-size="8.5" fill="#7f1d1d">10.10.2.4/30</text>
  <text x="84" y="235" font-family="monospace" font-size="8.5" fill="#dc2626" font-weight="600">... + 2,395 more /30 routes</text>
  <text x="160" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626" font-weight="700">⚠ 2,400 prefixes total</text>

  <!-- IPSec tunnels (before — stressed) -->
  <line x1="260" y1="185" x2="460" y2="185" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="360" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#dc2626">IPSec/IKEv2</text>
  <text x="360" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626" fill-opacity="0.7">BGP updates constant</text>

  <!-- VPN Gateway (before — stressed) -->
  <rect x="460" y="100" width="180" height="180" rx="10" fill="#fff" stroke="#dc2626" stroke-width="2"/>
  <text x="550" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">VPN Gateway</text>
  <text x="550" y="144" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">VpnGw1 · Active-Active</text>
  <!-- CPU gauge (red) -->
  <circle cx="550" cy="202" r="40" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="550" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#dc2626">95%</text>
  <text x="550" y="214" text-anchor="middle" font-family="monospace" font-size="10" fill="#dc2626">CPU</text>
  <text x="550" y="262" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">⚠ BGP reconverging</text>

  <!-- Azure Hub VNet (before) -->
  <rect x="700" y="90" width="200" height="180" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="800" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Hub VNet</text>
  <text x="800" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">10.0.0.0/16</text>

  <!-- Route table explosion in Azure -->
  <rect x="714" y="138" width="172" height="116" rx="4" fill="#fff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="800" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#1d4ed8" font-weight="600">Effective Routes</text>
  <text x="722" y="170" font-family="monospace" font-size="8.5" fill="#7f1d1d">10.10.1.0/30 → GW</text>
  <text x="722" y="183" font-family="monospace" font-size="8.5" fill="#7f1d1d">10.10.1.4/30 → GW</text>
  <text x="722" y="196" font-family="monospace" font-size="8.5" fill="#7f1d1d">10.10.1.8/30 → GW</text>
  <text x="722" y="209" font-family="monospace" font-size="8.5" fill="#dc2626" font-weight="600">... 2,400 entries</text>
  <text x="800" y="243" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">⚠ NIC route limit risk</text>

  <!-- Arrow: GW to Hub -->
  <line x1="640" y1="185" x2="700" y2="185" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Spoke VNets -->
  <rect x="960" y="110" width="130" height="60" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="1025" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Spoke A</text>
  <text x="1025" y="152" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">10.1.0.0/16</text>
  <line x1="900" y1="148" x2="960" y2="140" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="960" y="200" width="130" height="60" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="1025" y="226" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Spoke B</text>
  <text x="1025" y="242" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">10.2.0.0/16</text>
  <line x1="900" y1="195" x2="960" y2="228" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ═══════════════════════ DIVIDER ═══════════════════════ -->
  <line x1="0" y1="360" x2="1200" y2="360" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ═══════════════════════ AFTER (bottom half) ═══════════════════════ -->
  <rect x="0" y="362" width="1200" height="370" fill="#f0fdf4"/>
  <text x="16" y="384" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#16a34a" letter-spacing="0.06em">AFTER — Summarized Routes (12 prefixes)</text>

  <!-- On-prem DC (after) -->
  <rect x="60" y="398" width="200" height="200" rx="10" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="160" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Corporate DC</text>
  <text x="160" y="436" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">On-Premises</text>
  <!-- Route table (clean) -->
  <rect x="76" y="446" width="168" height="136" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="160" y="463" text-anchor="middle" font-family="monospace" font-size="9" fill="#16a34a" font-weight="600">Advertised Routes (BGP)</text>
  <text x="84" y="478" font-family="monospace" font-size="8.5" fill="#15803d">10.10.0.0/16  ← summarized</text>
  <text x="84" y="491" font-family="monospace" font-size="8.5" fill="#15803d">10.20.0.0/16  ← summarized</text>
  <text x="84" y="504" font-family="monospace" font-size="8.5" fill="#15803d">10.30.0.0/16  ← summarized</text>
  <text x="84" y="517" font-family="monospace" font-size="8.5" fill="#15803d">172.16.0.0/14 ← summarized</text>
  <text x="84" y="530" font-family="monospace" font-size="8.5" fill="#15803d">192.168.0.0/22 ← summarized</text>
  <text x="160" y="565" text-anchor="middle" font-family="monospace" font-size="9" fill="#16a34a" font-weight="700">✓ 12 prefixes total</text>

  <!-- IPSec tunnels (after — stable) -->
  <line x1="260" y1="498" x2="460" y2="498" stroke="#16a34a" stroke-width="2"/>
  <text x="360" y="490" text-anchor="middle" font-family="monospace" font-size="10" fill="#16a34a">IPSec/IKEv2</text>
  <text x="360" y="510" text-anchor="middle" font-family="monospace" font-size="9" fill="#15803d" fill-opacity="0.8">BGP stable · minimal updates</text>

  <!-- VPN Gateway (after — healthy) -->
  <rect x="460" y="408" width="180" height="180" rx="10" fill="#fff" stroke="#86efac" stroke-width="2"/>
  <text x="550" y="436" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">VPN Gateway</text>
  <text x="550" y="452" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">VpnGw2 · Active-Active</text>
  <!-- CPU gauge (green) -->
  <circle cx="550" cy="510" r="40" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="550" y="504" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#16a34a">38%</text>
  <text x="550" y="522" text-anchor="middle" font-family="monospace" font-size="10" fill="#16a34a">CPU</text>
  <text x="550" y="568" text-anchor="middle" font-family="monospace" font-size="9" fill="#16a34a">✓ stable, headroom OK</text>

  <!-- Azure Hub VNet (after) -->
  <rect x="700" y="400" width="200" height="180" rx="10" fill="#eff6ff" stroke="#86efac" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="800" y="422" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Hub VNet</text>
  <text x="800" y="438" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">10.0.0.0/16</text>
  <!-- Clean route table -->
  <rect x="714" y="448" width="172" height="116" rx="4" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="800" y="465" text-anchor="middle" font-family="monospace" font-size="9" fill="#16a34a" font-weight="600">Effective Routes</text>
  <text x="722" y="480" font-family="monospace" font-size="8.5" fill="#15803d">10.10.0.0/16 → GW</text>
  <text x="722" y="493" font-family="monospace" font-size="8.5" fill="#15803d">10.20.0.0/16 → GW</text>
  <text x="722" y="506" font-family="monospace" font-size="8.5" fill="#15803d">10.30.0.0/16 → GW</text>
  <text x="722" y="519" font-family="monospace" font-size="8.5" fill="#15803d">172.16.0.0/14 → GW</text>
  <text x="800" y="553" text-anchor="middle" font-family="monospace" font-size="9" fill="#16a34a">✓ 12 entries, within limits</text>

  <!-- Arrow: GW to Hub -->
  <line x1="640" y1="498" x2="700" y2="498" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Spoke VNets (after) -->
  <rect x="960" y="420" width="130" height="60" rx="8" fill="#eff6ff" stroke="#86efac" stroke-width="1"/>
  <text x="1025" y="446" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Spoke A</text>
  <text x="1025" y="462" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">10.1.0.0/16</text>
  <line x1="900" y1="458" x2="960" y2="450" stroke="#86efac" stroke-width="1.5"/>

  <rect x="960" y="510" width="130" height="60" rx="8" fill="#eff6ff" stroke="#86efac" stroke-width="1"/>
  <text x="1025" y="536" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Spoke B</text>
  <text x="1025" y="552" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">10.2.0.0/16</text>
  <line x1="900" y1="498" x2="960" y2="538" stroke="#86efac" stroke-width="1.5"/>

  <!-- Region 2 box -->
  <rect x="960" y="600" width="210" height="76" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="1065" y="622" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#92400e">Second Region</text>
  <text x="1065" y="638" text-anchor="middle" font-family="monospace" font-size="9" fill="#78350f">Hub-Spoke · VPN GW</text>
  <text x="1065" y="652" text-anchor="middle" font-family="monospace" font-size="9" fill="#78350f">Global VNet Peering</text>
  <text x="1065" y="666" text-anchor="middle" font-family="monospace" font-size="9" fill="#16a34a">✓ BGP stable here too</text>
  <line x1="900" y1="540" x2="960" y2="620" stroke="#fde68a" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Bottom note -->
  <rect x="0" y="718" width="1200" height="22" fill="#f8fafc"/>
  <line x1="0" y1="718" x2="1200" y2="718" stroke="#e2e8f0" stroke-width="1"/>
  <text x="600" y="733" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">AZUREFIXES.COM — VPN Gateway CPU: 95% → 38% via BGP route summarization + VpnGw1 → VpnGw2 SKU upgrade</text>
</svg>
