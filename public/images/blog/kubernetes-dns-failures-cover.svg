<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8860a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.16"/>
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="blue-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="48"/></filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 Z" fill="#c8860a" fill-opacity="0.6"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 Z" fill="#dc2626" fill-opacity="0.7"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="800" cy="200" rx="300" ry="250" fill="url(#red-glow)" filter="url(#blur)"/>
  <ellipse cx="1050" cy="420" rx="200" ry="180" fill="url(#blue-glow)" filter="url(#blur)"/>
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Troubleshooting badge -->
  <rect x="80" y="140" width="168" height="28" rx="14" fill="#dc2626" fill-opacity="0.15" stroke="#f87171" stroke-opacity="0.4" stroke-width="1"/>
  <text x="164" y="159" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" letter-spacing="0.07em">TROUBLESHOOTING</text>

  <!-- Title -->
  <text x="80" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Kubernetes DNS</text>
  <text x="80" y="286" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Resolution Failures</text>

  <!-- Subtitle -->
  <text x="80" y="334" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a89060" letter-spacing="0.01em">/etc/resolv.conf drift → asymmetric failures across node pools</text>

  <!-- Divider -->
  <line x1="80" y1="368" x2="500" y2="368" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Tags -->
  <rect x="80" y="382" width="72" height="22" rx="11" fill="#326ce5" fill-opacity="0.15" stroke="#60a5fa" stroke-opacity="0.35" stroke-width="1"/>
  <text x="116" y="397" text-anchor="middle" font-family="monospace" font-size="11" fill="#93c5fd">Kubernetes</text>

  <rect x="162" y="382" width="72" height="22" rx="11" fill="#326ce5" fill-opacity="0.1" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="1"/>
  <text x="198" y="397" text-anchor="middle" font-family="monospace" font-size="11" fill="#93c5fd">CoreDNS</text>

  <rect x="244" y="382" width="36" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="262" y="397" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4a843">AKS</text>

  <rect x="290" y="382" width="64" height="22" rx="11" fill="#dc2626" fill-opacity="0.1" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <text x="322" y="397" text-anchor="middle" font-family="monospace" font-size="11" fill="#fca5a5">Incident</text>

  <!-- Attribution -->
  <text x="80" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#5a4a2a" letter-spacing="0.06em">AZUREFIXES.COM</text>

  <!-- Right side: DNS flow diagram -->
  <!-- Pod box -->
  <rect x="720" y="150" width="120" height="56" rx="8" fill="#0a1628" stroke="#326ce5" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="780" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#93c5fd">Pod</text>
  <text x="780" y="188" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa" fill-opacity="0.6">app-7d9f84</text>
  <text x="780" y="202" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">getaddrinfo FAIL</text>

  <!-- Arrow pod → CoreDNS -->
  <line x1="840" y1="178" x2="898" y2="178" stroke="#c8860a" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="869" y="170" text-anchor="middle" font-family="monospace" font-size="9" fill="#c8860a" fill-opacity="0.6">UDP 53</text>

  <!-- CoreDNS box -->
  <rect x="898" y="150" width="130" height="56" rx="8" fill="#0a1628" stroke="#c8860a" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="963" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#f0a500">CoreDNS</text>
  <text x="963" y="188" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8860a" fill-opacity="0.6">kube-dns:53</text>
  <text x="963" y="202" text-anchor="middle" font-family="monospace" font-size="9" fill="#fbbf24">forwarding upstream</text>

  <!-- Arrow CoreDNS → upstream (with X) -->
  <line x1="1028" y1="178" x2="1086" y2="178" stroke="#dc2626" stroke-opacity="0.7" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arr-red)"/>

  <!-- Upstream resolver box (broken) -->
  <rect x="1086" y="150" width="84" height="56" rx="8" fill="#1a0808" stroke="#dc2626" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="1128" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f87171">Resolver</text>
  <text x="1128" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">/etc/resolv</text>
  <text x="1128" y="202" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626">.conf DRIFT</text>

  <!-- Big X overlay on resolver -->
  <text x="1128" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" fill="#dc2626" fill-opacity="0.35">✕</text>

  <!-- Second pod (working) -->
  <rect x="720" y="260" width="120" height="56" rx="8" fill="#0a1628" stroke="#16a34a" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="780" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#86efac">Pod</text>
  <text x="780" y="298" text-anchor="middle" font-family="monospace" font-size="10" fill="#22c55e" fill-opacity="0.7">app-3a2c11</text>
  <text x="780" y="312" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">DNS OK ✓</text>

  <!-- Arrow pod2 → CoreDNS -->
  <line x1="840" y1="288" x2="898" y2="230" stroke="#16a34a" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Node labels -->
  <rect x="706" y="136" width="148" height="14" rx="4" fill="#dc2626" fill-opacity="0.1"/>
  <text x="780" y="147" text-anchor="middle" font-family="monospace" font-size="9" fill="#f87171" letter-spacing="0.04em">NODE: aks-system-00045</text>

  <rect x="706" y="246" width="148" height="14" rx="4" fill="#16a34a" fill-opacity="0.1"/>
  <text x="780" y="257" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac" letter-spacing="0.04em">NODE: aks-system-00032</text>

  <!-- Asymmetric label -->
  <text x="780" y="352" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8860a" fill-opacity="0.6" letter-spacing="0.04em">ASYMMETRIC — same cluster, different nodes</text>

  <!-- Status bar -->
  <rect x="706" y="366" width="464" height="52" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="726" y="386" font-family="monospace" font-size="10" fill="#4b5563" letter-spacing="0.05em">ROOT CAUSE</text>
  <text x="726" y="403" font-family="monospace" font-size="11" fill="#fbbf24">Node pool upgrade didn't propagate DNS Operator config</text>
  <text x="726" y="418" font-family="monospace" font-size="11" fill="#22c55e">Fix: resync SystemResolvConf on affected nodes</text>
</svg>
