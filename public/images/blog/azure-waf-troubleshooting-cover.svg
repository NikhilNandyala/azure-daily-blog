<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8860a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="shield-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="shield-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14532d;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Ambient glows -->
  <ellipse cx="880" cy="250" rx="340" ry="260" fill="#c8860a" fill-opacity="0.07" filter="url(#blur)"/>
  <ellipse cx="1080" cy="440" rx="220" ry="180" fill="#dc2626" fill-opacity="0.06" filter="url(#blur)"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- TROUBLESHOOTING badge -->
  <rect x="80" y="140" width="168" height="28" rx="14" fill="#dc2626" fill-opacity="0.15" stroke="#f87171" stroke-opacity="0.4" stroke-width="1"/>
  <text x="164" y="159" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" letter-spacing="0.07em">TROUBLESHOOTING</text>

  <!-- Title -->
  <text x="80" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Fixing Azure WAF</text>
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">False Positives</text>

  <!-- Subtitle -->
  <text x="80" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#a89060" letter-spacing="0.01em">OWASP CRS · App Gateway · Front Door · 7-phase diagnostic</text>

  <!-- Divider -->
  <line x1="80" y1="356" x2="500" y2="356" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Tags -->
  <rect x="80" y="370" width="44" height="22" rx="11" fill="#dc2626" fill-opacity="0.12" stroke="#f87171" stroke-opacity="0.35" stroke-width="1"/>
  <text x="102" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#fca5a5">WAF</text>

  <rect x="134" y="370" width="64" height="22" rx="11" fill="#c8860a" fill-opacity="0.12" stroke="#c8860a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="166" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4a843">OWASP</text>

  <rect x="208" y="370" width="34" height="22" rx="11" fill="#7c3aed" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
  <text x="225" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">KQL</text>

  <rect x="252" y="370" width="78" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="291" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4a843">App Gateway</text>

  <!-- Attribution -->
  <text x="80" y="428" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#5a4a2a" letter-spacing="0.06em">AZUREFIXES.COM</text>

  <!-- Right side: WAF shield diagram -->
  <!-- Shield outline -->
  <path d="M940,148 L1120,148 L1120,320 Q1120,400 1030,440 Q940,400 940,320 Z"
        fill="#0a1628" stroke="#c8860a" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Shield center line (divides blocked vs allowed) -->
  <line x1="1030" y1="148" x2="1030" y2="440" stroke="#c8860a" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Left half: blocked (red) -->
  <path d="M940,148 L1030,148 L1030,440 Q940,400 940,320 Z"
        fill="url(#shield-left)" opacity="0.6"/>
  <text x="985" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="48" fill="#f87171" filter="url(#glow)">✕</text>
  <text x="985" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f87171">BLOCKED</text>
  <text x="985" y="325" text-anchor="middle" font-family="monospace" font-size="9" fill="#f87171" fill-opacity="0.6">942100 SQLi</text>
  <text x="985" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#f87171" fill-opacity="0.6">941100 XSS</text>
  <text x="985" y="351" text-anchor="middle" font-family="monospace" font-size="9" fill="#f87171" fill-opacity="0.5">(false positive)</text>

  <!-- Right half: allowed (green) -->
  <path d="M1030,148 L1120,148 L1120,320 Q1120,400 1030,440 Z"
        fill="url(#shield-right)" opacity="0.6"/>
  <text x="1075" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="48" fill="#86efac" filter="url(#glow)">✓</text>
  <text x="1075" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#86efac">ALLOWED</text>
  <text x="1075" y="325" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac" fill-opacity="0.6">exclusion set</text>
  <text x="1075" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac" fill-opacity="0.6">scope: field</text>
  <text x="1075" y="351" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac" fill-opacity="0.5">(tuned rule)</text>

  <!-- WAF label at shield top -->
  <rect x="981" y="154" width="98" height="22" rx="11" fill="#0a1628" stroke="#c8860a" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1030" y="169" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#d4a843">Azure WAF</text>

  <!-- 7-phase badge -->
  <rect x="730" y="370" width="380" height="60" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="750" y="392" font-family="monospace" font-size="10" fill="#4b5563" letter-spacing="0.05em">7 DIAGNOSTIC PHASES</text>
  <text x="750" y="410" font-family="monospace" font-size="10.5" fill="#c8860a">1. Collect impact  2. Query logs  3. Look up rule</text>
  <text x="750" y="424" font-family="monospace" font-size="10.5" fill="#c8860a">4. Reproduce  5. Decide  6. Exclude  7. Validate</text>
</svg>
