<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8860a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="48"/></filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 Z" fill="#c8860a" fill-opacity="0.6"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 Z" fill="#dc2626" fill-opacity="0.7"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 Z" fill="#16a34a" fill-opacity="0.7"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="820" cy="220" rx="300" ry="240" fill="url(#red-glow)" filter="url(#blur)"/>
  <ellipse cx="1060" cy="400" rx="220" ry="180" fill="url(#purple-glow)" filter="url(#blur)"/>
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Troubleshooting badge -->
  <rect x="80" y="140" width="168" height="28" rx="14" fill="#dc2626" fill-opacity="0.15" stroke="#f87171" stroke-opacity="0.4" stroke-width="1"/>
  <text x="164" y="159" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" letter-spacing="0.07em">TROUBLESHOOTING</text>

  <!-- Title -->
  <text x="80" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Fixing Enterprise</text>
  <text x="80" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">SSO / OAuth Failures</text>

  <!-- Subtitle -->
  <text x="80" y="324" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#a89060" letter-spacing="0.01em">OAuth 2.0 · OIDC · Entra ID · 8-step diagnostic guide</text>

  <!-- Divider -->
  <line x1="80" y1="356" x2="500" y2="356" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Tags -->
  <rect x="80" y="370" width="68" height="22" rx="11" fill="#7c3aed" fill-opacity="0.15" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1"/>
  <text x="114" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">OAuth 2.0</text>

  <rect x="158" y="370" width="44" height="22" rx="11" fill="#7c3aed" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.25" stroke-width="1"/>
  <text x="180" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">OIDC</text>

  <rect x="212" y="370" width="68" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="246" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4a843">Entra ID</text>

  <rect x="290" y="370" width="36" height="22" rx="11" fill="#dc2626" fill-opacity="0.1" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <text x="308" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#fca5a5">SSO</text>

  <!-- Attribution -->
  <text x="80" y="428" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#5a4a2a" letter-spacing="0.06em">AZUREFIXES.COM</text>

  <!-- Right side: OAuth flow mini diagram -->
  <!-- User box -->
  <rect x="730" y="148" width="90" height="44" rx="8" fill="#0a1628" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="775" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#c4b5fd">User</text>
  <text x="775" y="183" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed" fill-opacity="0.7">Resource Owner</text>

  <!-- Arrow down to App -->
  <line x1="775" y1="192" x2="775" y2="222" stroke="#c8860a" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- App box -->
  <rect x="730" y="222" width="90" height="44" rx="8" fill="#0a1628" stroke="#c8860a" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="775" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f0a500">App</text>
  <text x="775" y="257" text-anchor="middle" font-family="monospace" font-size="9" fill="#c8860a" fill-opacity="0.7">OAuth Client</text>

  <!-- Arrow right to IdP -->
  <line x1="820" y1="244" x2="888" y2="244" stroke="#c8860a" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="854" y="237" text-anchor="middle" font-family="monospace" font-size="9" fill="#c8860a" fill-opacity="0.5">/authorize</text>

  <!-- IdP box (Entra ID) -->
  <rect x="888" y="222" width="110" height="44" rx="8" fill="#0a1628" stroke="#dc2626" stroke-opacity="0.6" stroke-width="2"/>
  <text x="943" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f87171">Entra ID</text>
  <text x="943" y="256" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626" fill-opacity="0.7">Auth Server ✕</text>
  <!-- Red X -->
  <text x="943" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#dc2626" fill-opacity="0.3">✕</text>

  <!-- Error badge -->
  <rect x="888" y="276" width="110" height="22" rx="6" fill="#7f1d1d" fill-opacity="0.3" stroke="#f87171" stroke-opacity="0.4" stroke-width="1"/>
  <text x="943" y="291" text-anchor="middle" font-family="monospace" font-size="10" fill="#fca5a5">AADSTS50011</text>

  <!-- Arrow down from App to Resource -->
  <line x1="775" y1="266" x2="775" y2="308" stroke="#16a34a" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-green)"/>
  <text x="730" y="293" font-family="monospace" font-size="9" fill="#16a34a" fill-opacity="0.5">token</text>

  <!-- Resource box -->
  <rect x="730" y="308" width="90" height="44" rx="8" fill="#0a1628" stroke="#16a34a" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="775" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#86efac">API</text>
  <text x="775" y="343" text-anchor="middle" font-family="monospace" font-size="9" fill="#16a34a" fill-opacity="0.6">Resource Server</text>

  <!-- Common errors panel -->
  <rect x="730" y="374" width="450" height="72" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="750" y="394" font-family="monospace" font-size="10" fill="#4b5563" letter-spacing="0.05em">COMMON ERROR CODES</text>
  <text x="750" y="411" font-family="monospace" font-size="11" fill="#f87171">AADSTS50011 — redirect_uri mismatch</text>
  <text x="750" y="427" font-family="monospace" font-size="11" fill="#fbbf24">AADSTS7000215 — invalid client secret</text>
  <text x="750" y="443" font-family="monospace" font-size="11" fill="#f87171">AADSTS700016 — application not found in tenant</text>

  <!-- 8-step badge -->
  <rect x="1020" y="222" width="140" height="60" rx="8" fill="#7c3aed" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="1090" y="246" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#a78bfa">8</text>
  <text x="1090" y="268" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa" fill-opacity="0.7">DIAGNOSTIC STEPS</text>
</svg>
