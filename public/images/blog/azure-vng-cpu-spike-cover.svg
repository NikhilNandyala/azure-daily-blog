<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8860a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.04"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="45"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="780" cy="200" rx="300" ry="240" fill="url(#red-glow)" filter="url(#blur)"/>
  <ellipse cx="1080" cy="340" rx="220" ry="180" fill="url(#green-glow)" filter="url(#blur)"/>

  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Grid -->
  <line x1="0" y1="530" x2="1200" y2="530" stroke="#c8860a" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Troubleshooting badge (red) -->
  <rect x="80" y="140" width="168" height="28" rx="14" fill="#dc2626" fill-opacity="0.15" stroke="#f87171" stroke-opacity="0.4" stroke-width="1"/>
  <text x="164" y="159" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fca5a5" letter-spacing="0.07em">TROUBLESHOOTING</text>

  <!-- Title -->
  <text x="80" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Fixing Azure VPN</text>
  <text x="80" y="294" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#f5f0e8" letter-spacing="-0.02em">Gateway CPU Spikes</text>

  <!-- Subtitle -->
  <text x="80" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a89060" letter-spacing="0.01em">Route explosion → summarization → 95% to 38%</text>

  <!-- Divider -->
  <line x1="80" y1="380" x2="500" y2="380" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Tag chips -->
  <rect x="80" y="394" width="72" height="22" rx="11" fill="#dc2626" fill-opacity="0.1" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <text x="116" y="409" text-anchor="middle" font-family="monospace" font-size="11" fill="#fca5a5">VPN GW</text>

  <rect x="162" y="394" width="52" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="188" y="409" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4a843">BGP</text>

  <rect x="224" y="394" width="86" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="267" y="409" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4a843">ExpressRoute</text>

  <rect x="320" y="394" width="70" height="22" rx="11" fill="#c8860a" fill-opacity="0.1" stroke="#c8860a" stroke-opacity="0.25" stroke-width="1"/>
  <text x="355" y="409" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4a843">Networking</text>

  <!-- Attribution -->
  <text x="80" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#5a4a2a" letter-spacing="0.06em">AZUREFIXES.COM</text>

  <!-- ─── Right side: Before / After CPU gauges ─── -->
  <!-- BEFORE gauge -->
  <text x="780" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#f87171" fill-opacity="0.7" letter-spacing="0.06em">BEFORE</text>

  <!-- Gauge arc background -->
  <path d="M 680 340 A 100 100 0 0 1 880 340" fill="none" stroke="#1a2a1a" stroke-width="18" stroke-linecap="round"/>
  <!-- Red fill — 95% -->
  <path d="M 680 340 A 100 100 0 0 1 868 284" fill="none" stroke="#dc2626" stroke-width="18" stroke-linecap="round" opacity="0.85"/>
  <!-- Gauge center text -->
  <text x="780" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="800" fill="#f87171">95%</text>
  <text x="780" y="348" text-anchor="middle" font-family="monospace" font-size="11" fill="#f87171" fill-opacity="0.6">CPU</text>
  <!-- Danger label -->
  <rect x="734" y="358" width="92" height="20" rx="10" fill="#dc2626" fill-opacity="0.15" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <text x="780" y="372" text-anchor="middle" font-family="monospace" font-size="10" fill="#fca5a5" font-weight="600">BGP STORM</text>

  <!-- Arrow between gauges -->
  <text x="940" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#c8860a" fill-opacity="0.6">→</text>

  <!-- AFTER gauge -->
  <text x="1080" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" fill-opacity="0.7" letter-spacing="0.06em">AFTER</text>

  <path d="M 980 340 A 100 100 0 0 1 1180 340" fill="none" stroke="#0a1a0a" stroke-width="18" stroke-linecap="round"/>
  <!-- Green fill — 38% -->
  <path d="M 980 340 A 100 100 0 0 1 1048 218" fill="none" stroke="#16a34a" stroke-width="18" stroke-linecap="round" opacity="0.85"/>
  <!-- Center text -->
  <text x="1080" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="800" fill="#22c55e">38%</text>
  <text x="1080" y="348" text-anchor="middle" font-family="monospace" font-size="11" fill="#22c55e" fill-opacity="0.6">CPU</text>
  <!-- Healthy label -->
  <rect x="1031" y="358" width="98" height="20" rx="10" fill="#16a34a" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1080" y="372" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac" font-weight="600">SUMMARIZED</text>

  <!-- Fix label -->
  <text x="930" y="420" text-anchor="middle" font-family="monospace" font-size="11" fill="#c8860a" fill-opacity="0.5">route summarization</text>
  <text x="930" y="436" text-anchor="middle" font-family="monospace" font-size="11" fill="#c8860a" fill-opacity="0.4">2,400 routes → 12 prefixes</text>
</svg>
